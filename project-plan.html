<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovCert — Project Plan · govcert.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1929;--navy2:#112238;--gold:#C89B3C;--gold2:#E8B84B;
  --cream:#F5F1E8;--cream2:#EDE8DB;--ink:#0B1929;--ink3:#5A7A96;--ink4:#8BA0B4;
  --border:rgba(11,25,41,.09);--border2:rgba(11,25,41,.16);
  --green:#1A6644;--green-bg:#E6F4EE;--green-b:rgba(26,102,68,.2);
  --amber:#8A5E10;--amber-bg:#FBF0DC;--amber-b:rgba(138,94,16,.2);
  --red:#8B1D1D;--red-bg:#FAE8E8;--red-b:rgba(139,29,29,.2);
  --r:6px;--rl:10px;
  --shadow:0 1px 3px rgba(11,25,41,.06),0 4px 12px rgba(11,25,41,.05);
  --shadow-lg:0 8px 32px rgba(11,25,41,.12);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:13.5px;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.body{flex:1;overflow-y:auto;padding:22px 24px}
.sb-header{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-brand{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.sb-icon{width:28px;height:28px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center}
.sb-icon svg{width:14px;height:14px;fill:#fff}
.sb-name{font-family:'Cormorant Garamond',serif;font-size:19px;color:#fff;font-weight:400}
.sb-name em{color:var(--gold2);font-style:normal}
.sb-sub{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.09em}
.sb-progress{margin:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:10px 12px}
.sb-p-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.sb-p-label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em}
.sb-p-val{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold2);font-weight:400}
.sb-pbar{height:3px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden}
.sb-pfill{height:100%;background:var(--gold);border-radius:100px;transition:width .5s}
.sb-nav{padding:10px 8px;flex:1}
.sb-section{margin-bottom:16px}
.sb-sec-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);padding:0 9px;margin-bottom:4px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.42);font-size:12.5px;transition:all .12s;margin-bottom:1px}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.78)}
.sb-item.on{background:rgba(200,155,60,.15);color:var(--gold2);font-weight:500}
.sb-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-item-dot.done{background:var(--green)}
.sb-item-dot.active{background:var(--gold)}
.sb-item-dot.planned{background:rgba(255,255,255,.2)}
.sb-item-pct{margin-left:auto;font-size:10px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);font-size:10.5px;color:rgba(255,255,255,.28);line-height:1.5}
.ov-header{background:linear-gradient(135deg,var(--navy2) 0%,var(--navy) 100%);border-radius:var(--rl);padding:22px 26px;margin-bottom:18px;color:#fff}
.ov-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;margin-bottom:3px}
.ov-sub{font-size:12px;color:rgba(255,255,255,.42);margin-bottom:18px;line-height:1.6}
.ov-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.ov-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:10px 14px}
.ov-sv{font-family:'Cormorant Garamond',serif;font-size:26px;color:#fff;line-height:1}
.ov-sl{font-size:9.5px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.phase-card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.phase-header{padding:12px 16px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none;transition:background .12s}
.phase-header:hover{background:var(--cream)}
.phase-status-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700}
.psi-done{background:var(--green-bg);color:var(--green)}
.psi-active{background:var(--amber-bg);color:var(--amber)}
.psi-planned{background:var(--cream2);color:var(--ink4)}
.phase-info{flex:1}
.phase-name{font-size:13.5px;font-weight:500;color:var(--navy)}
.phase-meta{font-size:11.5px;color:var(--ink3)}
.phase-right{text-align:right;flex-shrink:0;min-width:90px}
.phase-pct{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--navy);line-height:1}
.phase-pct-bar{height:3px;background:var(--cream2);border-radius:100px;margin-top:5px;overflow:hidden}
.phase-pct-fill{height:100%;border-radius:100px}
.phase-body{display:none;border-top:1px solid var(--border)}
.phase-body.open{display:block}
.task-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.task-section:last-child{border-bottom:none}
.task-sec-header{font-size:10px;text-transform:uppercase;letter-spacing:.09em;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.task-list{display:flex;flex-direction:column;gap:4px}
.task{display:flex;align-items:flex-start;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.task:hover{background:var(--cream)}
.task-checkbox{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task.done .task-checkbox{background:var(--green);border-color:var(--green)}
.task.done .task-checkbox::after{content:'✓';font-size:8px;color:#fff;font-weight:800}
.task.active .task-checkbox{border-color:var(--amber);background:var(--amber-bg)}
.task.active .task-checkbox::after{content:'→';font-size:8px;color:var(--amber);font-weight:700}
.task-title{font-size:12.5px;color:var(--ink);line-height:1.4}
.task.done .task-title{text-decoration:line-through;color:var(--ink3)}
.task-meta{flex-shrink:0;text-align:right}
.task-when{font-size:10px;color:var(--ink4);font-family:'DM Mono',monospace}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:500}
.bg-green{background:var(--green-bg);color:var(--green)}
.bg-amber{background:var(--amber-bg);color:var(--amber)}
.bg-gray{background:var(--cream2);color:var(--ink3)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:500;color:var(--navy);margin-bottom:10px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:9px 14px;border-radius:var(--r);font-size:12.5px;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:9999}
.toast.show{transform:none;opacity:1}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--navy);font-weight:400}
.tb-sub{font-size:11.5px;color:var(--ink3)}
.btn{padding:6px 13px;border-radius:var(--r);font-size:12.5px;cursor:pointer;border:1px solid var(--border2);background:#fff;color:var(--ink);font-weight:500}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-brand">
      <div class="sb-icon"><svg viewBox="0 0 16 16"><path d="M8 1L1 4.5v4C1 12 4.5 14.5 8 15c3.5-.5 7-3 7-6.5v-4L8 1z"/></svg></div>
      <span class="sb-name">Gov<em>Cert</em></span>
    </div>
    <div class="sb-sub">Project Plan · Updated Mar 21 2026</div>
  </div>
  <div class="sb-progress">
    <div class="sb-p-row"><span class="sb-p-label">Overall Progress</span><span class="sb-p-val" id="sb-pct">0%</span></div>
    <div class="sb-pbar"><div class="sb-pfill" id="sb-pfill" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span style="font-size:10px;color:rgba(255,255,255,.28)" id="sb-done-tasks">0 tasks done</span>
      <span style="font-size:10px;color:rgba(255,255,255,.28)" id="sb-total-tasks">0 total</span>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">
      <div class="sb-sec-label">Phases</div>
      <div id="sb-phases"></div>
    </div>
  </nav>
  <div class="sb-footer">
    Backend: govcert.ai (Railway)<br>
    Frontend: govcert-web.vercel.app<br>
    jhouse84/govcert + jhouse84/govcert-web
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="tb-title">GovCert Project Plan</div>
      <div class="tb-sub">Click any task to update status · Mar 21 2026</div>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <span class="badge bg-green">✓ Done</span>
      <span class="badge bg-amber">→ Active</span>
      <span class="badge bg-gray">◦ Planned</span>
      <button class="btn btn-gold btn-sm" onclick="exportStatus()">Export</button>
    </div>
  </div>
  <div class="body" id="phase-cards"></div>
</div>
</div>
<div class="toast" id="toast-el"><span style="color:var(--gold2)">✦</span><span id="toast-msg"></span></div>
<script>
const PHASES = [
  {id:1,title:'Frontend Prototype',subtitle:'All screens built as static HTML',status:'done',color:'var(--green)',
   sections:[{label:'Complete',labelColor:'var(--green)',tasks:[
    {title:'Landing page, Admin Panel, Customer Portal',status:'done',when:'Session 1'},
    {title:'8(a) and GSA MAS wizards',status:'done',when:'Session 1'},
    {title:'OAuth connection UI, Compliance calendar, Document vault',status:'done',when:'Session 1'},
  ]}]},
  {id:2,title:'Backend Foundation',subtitle:'Node.js · Express · Railway · PostgreSQL · Auth',status:'done',color:'var(--green)',
   sections:[
    {label:'Infrastructure',labelColor:'var(--red)',tasks:[
      {title:'VS Code, Node.js, Git installed on Windows',status:'done',when:'Day 1'},
      {title:'GitHub + Railway + govcert.ai domain configured',status:'done',when:'Day 1'},
      {title:'Auto-deploy from GitHub to Railway',status:'done',when:'Day 1'},
      {title:'DATABASE_URL env var resolving in Railway',status:'done',when:'Day 1'},
    ]},
    {label:'API Keys',labelColor:'var(--amber)',tasks:[
      {title:'Anthropic, SAM.gov, QuickBooks, Gusto, SendGrid registered',status:'done',when:'Day 1'},
    ]},
    {label:'Database & Auth',labelColor:'var(--purple,#4A1A7A)',tasks:[
      {title:'Prisma schema — 8 core models',status:'done',when:'Day 2'},
      {title:'Full application schema — CertificationApplication, PastPerformance, PPQ, ChangeLog, AdvisorNote',status:'done',when:'Day 3'},
      {title:'authService.js — register/login/JWT/bcrypt',status:'done',when:'Day 2'},
      {title:'Auth middleware, Client routes, Certification routes',status:'done',when:'Day 2'},
      {title:'Application routes — save/resume wizard data',status:'done',when:'Day 3'},
      {title:'PPQ routes — create, send, respond',status:'done',when:'Day 3'},
      {title:'CORS configured for Vercel frontend',status:'done',when:'Day 2'},
    ]},
  ]},
  {id:3,title:'Next.js Frontend',subtitle:'Vercel · Design system · Core pages',status:'done',color:'var(--green)',
   sections:[{label:'Pages Built',labelColor:'#1A3F7A',tasks:[
    {title:'Next.js app on Vercel — govcert-web.vercel.app',status:'done',when:'Day 4'},
    {title:'GovCert design system — navy/gold/Cormorant Garamond',status:'done',when:'Day 4'},
    {title:'Landing page — hero, features, certifications, pricing',status:'done',when:'Day 4'},
    {title:'Login + Register pages — dark navy design',status:'done',when:'Day 4'},
    {title:'Dashboard — sidebar, stats, quick actions',status:'done',when:'Day 4'},
    {title:'Clients list + Add New Client form',status:'done',when:'Day 4'},
    {title:'Client detail page',status:'done',when:'Day 4'},
    {title:'Certifications list page',status:'done',when:'Day 4'},
    {title:'Certification wizard — 5 steps, SIN selection',status:'done',when:'Day 4'},
    {title:'Project plan page — govcert-web.vercel.app/plan',status:'done',when:'Day 4'},
    {title:'Shared Sidebar component',status:'done',when:'Day 4'},
  ]}]},
  {id:4,title:'Certification Application Engine',subtitle:'Waiver detection · Save/resume · PPQ builder · AI narratives',status:'active',color:'var(--gold)',
   sections:[
    {label:'Immediate Next',labelColor:'var(--amber)',tasks:[
      {title:'Certification detail page — view application data, status, changelog',status:'active',when:'Next'},
      {title:'Waiver detection — auto-detect eligibility gap, offer waiver path',status:'planned',when:'Next'},
      {title:'Save/resume — load existing application data into wizard',status:'planned',when:'Next'},
      {title:'PPQ builder UI — add past performance, send PPQ to reference',status:'planned',when:'Next'},
      {title:'PPQ response page — public form for references to fill out',status:'planned',when:'Next'},
      {title:'AI narrative drafting — Claude API generates QCP, experience, corporate overview',status:'planned',when:'Next'},
      {title:'Advisor notes UI — leave guidance on application sections',status:'planned',when:'Next'},
      {title:'Change log UI — show who changed what',status:'planned',when:'Next'},
    ]},
  ]},
  {id:5,title:'Integrations — QuickBooks · Gusto · SAM.gov',subtitle:'OAuth proxy · Real data auto-population',status:'planned',color:'var(--ink4)',
   sections:[{label:'OAuth & Data',labelColor:'var(--amber)',tasks:[
    {title:'QuickBooks OAuth proxy — /api/oauth/start + callback',status:'planned',when:'Week 2'},
    {title:'QB data fetcher — P&L, Balance Sheet, Employees',status:'planned',when:'Week 2'},
    {title:'Gusto OAuth proxy + employee/payroll data',status:'planned',when:'Week 2'},
    {title:'SAM.gov entity lookup by UEI',status:'planned',when:'Week 2'},
    {title:'Auto-populate wizard fields from connected integrations',status:'planned',when:'Week 2'},
  ]}]},
  {id:6,title:'Customer Portal & Email',subtitle:'Invite flow · SendGrid · Approval workflow',status:'planned',color:'var(--ink4)',
   sections:[{label:'Customer Flow',labelColor:'#4A1A7A',tasks:[
    {title:'Customer invite email via SendGrid',status:'planned',when:'Week 3'},
    {title:'Customer password setup page',status:'planned',when:'Week 3'},
    {title:'Narrative approval workflow',status:'planned',when:'Week 3'},
    {title:'Action item system',status:'planned',when:'Week 3'},
  ]}]},
  {id:7,title:'Document Service',subtitle:'Upload · Cloudflare R2 · PDF Generation',status:'planned',color:'var(--ink4)',
   sections:[{label:'Documents',labelColor:'#1A6A6A',tasks:[
    {title:'Cloudflare R2 bucket setup',status:'planned',when:'Week 3'},
    {title:'File upload API + pre-signed download URLs',status:'planned',when:'Week 3'},
    {title:'PDF generator — Financial Statements, Submission Package',status:'planned',when:'Week 3'},
  ]}]},
  {id:8,title:'Billing & Subscription Tiers',subtitle:'Platform vs Consulting · Stripe · Feature gating',status:'planned',color:'var(--ink4)',
   sections:[{label:'Billing',labelColor:'var(--green)',tasks:[
    {title:'Stripe integration — subscription management',status:'planned',when:'Week 3'},
    {title:'Feature gating — Platform vs Consulting tier',status:'planned',when:'Week 3'},
    {title:'Subscription management page',status:'planned',when:'Week 3'},
  ]}]},
  {id:9,title:'Compliance Engine',subtitle:'SAM.gov alerts · Cron jobs · Reminders',status:'planned',color:'var(--ink4)',
   sections:[{label:'Compliance',labelColor:'#1A6A6A',tasks:[
    {title:'Daily SAM.gov expiry check cron job',status:'planned',when:'Week 3'},
    {title:'SendGrid compliance alert email templates',status:'planned',when:'Week 3'},
    {title:'Compliance calendar wired to real database events',status:'planned',when:'Week 3'},
  ]}]},
  {id:10,title:'QA, Security & Launch',subtitle:'Hardening · Testing · govcert.ai live',status:'planned',color:'var(--ink4)',
   sections:[{label:'Launch',labelColor:'var(--green)',tasks:[
    {title:'Input validation on all API endpoints',status:'planned',when:'Week 3'},
    {title:'Full end-to-end flow test — Admin + Customer paths',status:'planned',when:'Week 3'},
    {title:'Connect govcert.ai domain to Vercel frontend',status:'planned',when:'Week 3'},
    {title:'Onboard first real client end-to-end',status:'planned',when:'Week 3'},
    {title:'🚀 govcert.ai is live',status:'planned',when:'Week 3'},
  ]}]},
];

function computeTotals(){
  let total=0,done=0;
  PHASES.forEach(p=>p.sections.forEach(s=>s.tasks.forEach(t=>{total++;if(t.status==='done')done++;})));
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function updateCounters(){
  const{total,done,pct}=computeTotals();
  document.getElementById('sb-pct').textContent=pct+'%';
  document.getElementById('sb-pfill').style.width=pct+'%';
  document.getElementById('sb-done-tasks').textContent=done+' tasks done';
  document.getElementById('sb-total-tasks').textContent=total+' total';
}
function statusColor(s){return s==='done'?'var(--green)':s==='active'?'var(--gold)':'var(--ink4)';}
function statusLabel(s){return s==='done'?'✓ Complete':s==='active'?'→ In Progress':'◦ Planned';}
function statusClass(s){return s==='done'?'bg-green':s==='active'?'bg-amber':'bg-gray';}

function renderSidebar(){
  document.getElementById('sb-phases').innerHTML=PHASES.map(p=>{
    const tasks=p.sections.flatMap(s=>s.tasks);
    const done=tasks.filter(t=>t.status==='done').length;
    const pct=Math.round(done/tasks.length*100);
    return`<div class="sb-item" onclick="scrollToPhase(${p.id})">
      <div class="sb-item-dot ${p.status}"></div>
      <span>P${p.id}: ${p.title.split(' ').slice(0,3).join(' ')}</span>
      <span class="sb-item-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function renderPhases(){
  document.getElementById('phase-cards').innerHTML=PHASES.map(p=>{
    const tasks=p.sections.flatMap(s=>s.tasks);
    const done=tasks.filter(t=>t.status==='done').length;
    const pct=Math.round(done/tasks.length*100);
    const isOpen=p.status==='active';
    return`<div class="phase-card" id="phase-${p.id}">
      <div class="phase-header" onclick="togglePhase(${p.id})">
        <div class="phase-status-icon psi-${p.status}">${p.status==='done'?'✓':p.status==='active'?'→':'◦'}</div>
        <div class="phase-info">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <div class="phase-name">Phase ${p.id}: ${p.title}</div>
            <span class="badge ${statusClass(p.status)}" style="font-size:9.5px">${statusLabel(p.status)}</span>
          </div>
          <div class="phase-meta">${p.subtitle} · ${done}/${tasks.length} tasks</div>
        </div>
        <div class="phase-right">
          <div class="phase-pct" style="color:${p.color}">${pct}%</div>
          <div class="phase-pct-bar"><div class="phase-pct-fill" style="width:${pct}%;background:${p.color}"></div></div>
        </div>
      </div>
      <div class="phase-body${isOpen?' open':''}" id="pb-${p.id}">
        ${p.sections.map(sec=>`
          <div class="task-section">
            <div class="task-sec-header" style="color:${sec.labelColor}">
              <span style="width:8px;height:8px;background:${sec.labelColor};border-radius:2px;display:inline-block;flex-shrink:0"></span>
              ${sec.label}
            </div>
            <div class="task-list">${sec.tasks.map(t=>`
              <div class="task ${t.status}" onclick="cycleTask(${p.id},'${t.title.substring(0,40).replace(/'/g,"\\'")}')">
                <div class="task-checkbox"></div>
                <div style="flex:1"><div class="task-title">${t.title}</div></div>
                <div class="task-meta"><div class="task-when">${t.when||''}</div></div>
              </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function togglePhase(id){document.getElementById('pb-'+id).classList.toggle('open');}
function scrollToPhase(id){
  const el=document.getElementById('phase-'+id);
  if(el){el.scrollIntoView({behavior:'smooth'});document.getElementById('pb-'+id).classList.add('open');}
}
function cycleTask(phaseId,titleStart){
  const phase=PHASES.find(p=>p.id===phaseId);
  let task;
  phase.sections.forEach(s=>{task=task||s.tasks.find(t=>t.title.startsWith(titleStart));});
  if(!task)return;
  const cycle=['planned','active','done'];
  task.status=cycle[(cycle.indexOf(task.status)+1)%cycle.length];
  const tasks=phase.sections.flatMap(s=>s.tasks);
  const done=tasks.filter(t=>t.status==='done').length;
  if(done===tasks.length)phase.status='done';
  else if(tasks.some(t=>t.status==='active')||done>0)phase.status='active';
  else phase.status='planned';
  phase.color=statusColor(phase.status);
  renderPhases();
  renderSidebar();
  updateCounters();
  toast('Task → '+task.status);
}
function exportStatus(){
  const{total,done,pct}=computeTotals();
  const lines=[`GovCert Status — ${new Date().toLocaleDateString()}`,`${pct}% (${done}/${total})`,''];
  PHASES.forEach(p=>{
    const t=p.sections.flatMap(s=>s.tasks);
    lines.push(`P${p.id}: ${p.title} — ${t.filter(x=>x.status==='done').length}/${t.length}`);
    p.sections.forEach(s=>s.tasks.forEach(t=>lines.push(`  [${t.status.toUpperCase()}] ${t.title}`)));
    lines.push('');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download=`GovCert_${new Date().toISOString().split('T')[0]}.txt`;
  a.click();
}
let toastT;
function toast(msg){
  const el=document.getElementById('toast-el');
  document.getElementById('toast-msg').textContent=msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),3000);
}
renderSidebar();
renderPhases();
updateCounters();
</script>
</body>
</html>
